name: Deploy to Firebase

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'storage.rules'
      - '.firebaserc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Deploy hosting, Firestore rules, and Storage rules
        run: firebase deploy --only hosting,firestore:rules,storage --project tattoo-generator-87f36
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
